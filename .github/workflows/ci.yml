name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # mvn test activates server/src/test/resources/application.yml which connects
    # to oa_test on PostgreSQL 5433. Provision a service container that matches
    # the local dev setup so Flyway migrations and surefire tests run identically.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oa_test
          POSTGRES_USER: oa_dev
          POSTGRES_PASSWORD: oa_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run backend tests
        working-directory: server
        run: mvn test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: server/target/surefire-reports/
          retention-days: 7

  frontend-h5-test:
    name: Frontend H5 Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Vitest needs .nuxt/tsconfig.json (gitignored, generated by nuxt prepare).
      - name: Generate Nuxt types (.nuxt/tsconfig.json)
        working-directory: app/h5
        run: npx nuxt prepare

      - name: Run H5 tests
        run: yarn workspace oa-h5 test

      - name: Upload H5 coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h5-coverage-report
          path: app/h5/coverage/
          retention-days: 7

  migration-validate:
    name: Flyway Migration Validation (PostgreSQL)
    # Validates that all V*.sql Flyway migrations apply cleanly to a real PostgreSQL instance.
    # Catches drift between db/schema.sql (H2 dev) and db/migration/ (prod path) on every push.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oa_validate
          POSTGRES_USER: oa
          POSTGRES_PASSWORD: oa_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flyway CLI
        run: |
          curl -fsSL https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-linux-x64.tar.gz \
            | tar xz -C /opt
          sudo ln -s /opt/flyway-9.22.3/flyway /usr/local/bin/flyway

      - name: Run migrations against PostgreSQL
        run: |
          flyway \
            -url="jdbc:postgresql://localhost:5432/oa_validate" \
            -user=oa \
            -password=oa_pw \
            -locations="filesystem:server/src/main/resources/db/migration" \
            migrate

  integration-test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # spring-boot:run -Dspring-boot.run.profiles=dev activates application-dev.yml
    # which connects to oa_dev on PostgreSQL 5433. Provision the service container
    # so the backend can boot and Flyway migrations apply.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oa_dev
          POSTGRES_USER: oa_dev
          POSTGRES_PASSWORD: oa_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      # Vitest under yarn test:integration imports app/h5/* — needs .nuxt/tsconfig.json.
      - name: Generate Nuxt types (.nuxt/tsconfig.json)
        working-directory: app/h5
        run: npx nuxt prepare

      - name: Start backend service
        working-directory: server
        # Capture stdout/stderr to /tmp/backend.log so the readiness step can
        # surface startup failures instead of just hitting a timeout.
        run: mvn spring-boot:run -Dspring-boot.run.profiles=dev > /tmp/backend.log 2>&1 &

      - name: Wait for backend to be ready
        # `wait-on http://...` defaults to HEAD which Spring Boot 3 actuator may
        # not handle, and the actuator base-path behaviour relative to
        # servlet.context-path differs between Spring Boot versions. Use an
        # explicit GET-based curl loop that probes both possible URLs and prints
        # status codes each tick — much easier to diagnose than wait-on timeouts.
        run: |
          for i in $(seq 1 60); do
            sleep 5
            api_code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/api/actuator/health || echo 000)
            root_code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/actuator/health || echo 000)
            if [ "$api_code" = "200" ] || [ "$root_code" = "200" ]; then
              echo "Backend ready at attempt $i (api=$api_code, root=$root_code)"
              exit 0
            fi
            echo "attempt $i: /api/actuator/health=$api_code, /actuator/health=$root_code"
          done
          echo "===== backend.log ====="
          cat /tmp/backend.log
          exit 1

      - name: Run integration tests
        run: yarn test:integration

  frontend-mp-test:
    name: Frontend MP Tests
    # MP (mini-program) product scope is paused until Phase F kicks off.
    # Re-enable by removing `if: false` when Phase F starts.
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run MP tests
        run: yarn workspace oa-mp test
