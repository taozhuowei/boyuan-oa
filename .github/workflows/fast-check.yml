name: Fast Check

# Runs on every push to every branch.
# Target: complete in under 5 minutes without starting any service.
# Spotless, Prettier, ESLint, and Knip steps are conditional — they skip gracefully
# until the corresponding C+-DESIGN tasks configure those tools.

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # mvn test activates server/src/test/resources/application.yml which connects
    # to oa_test on PostgreSQL 5433. Local dev runs Postgres 15 on 5433; CI mirrors
    # that via a service container so the same Flyway migrations execute.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oa_test
          POSTGRES_USER: oa_dev
          POSTGRES_PASSWORD: oa_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Spotless is configured in C+-D-14. Skip gracefully until then.
      - name: Check code formatting (Spotless)
        working-directory: server
        run: mvn spotless:check -q || echo "Spotless not configured yet, skipping"

      # Runs existing 392 unit tests + ArchUnit once C+-D-01 activates it.
      - name: Run backend unit tests
        working-directory: server
        run: mvn test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: server/target/surefire-reports/
          retention-days: 7

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # app/h5/tsconfig.json extends ./.nuxt/tsconfig.json which is generated by
      # `nuxt prepare` and gitignored. Without this step Vitest fails to resolve
      # the extends chain and every test suite errors out.
      - name: Generate Nuxt types (.nuxt/tsconfig.json)
        working-directory: app/h5
        run: npx nuxt prepare

      # Prettier is configured in C+-D-13. Skip gracefully until then.
      - name: Check code formatting (Prettier)
        run: yarn format:check || echo "Prettier not configured yet, skipping"

      # ESLint strict config is set up in C+-D-09/15. Skip gracefully until then.
      - name: Lint H5 source (ESLint + TypeScript strict)
        run: yarn workspace oa-h5 lint || echo "ESLint not configured yet, skipping"

      - name: Run H5 unit tests
        run: yarn workspace oa-h5 test

      # Knip dead-code detection is configured in C+-D-16. Skip gracefully until then.
      - name: Detect unused exports (Knip)
        run: yarn knip || echo "Knip not configured yet, skipping"

  security-static:
    name: Security Static Analysis
    runs-on: ubuntu-latest
    # continue-on-error: security findings are recorded but must not block the pipeline
    continue-on-error: true
    permissions:
      contents: read
    # secrets cannot be referenced inside `if` directly — bridge through env
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      # --error exits non-zero on findings; || true prevents blocking the pipeline
      - name: Semgrep scan — Spring Boot backend
        run: semgrep --config p/spring-boot --config p/owasp-top-ten server/src --error || true

      - name: Semgrep scan — H5 TypeScript frontend
        run: semgrep --config p/typescript app/h5 --error || true

      # Snyk backend — only runs when SNYK_TOKEN secret is present
      # --policy-path 显式指向仓库根的 .snyk 文件（CLI 默认仅在项目目录找，但项目目录是 server/）
      - name: Snyk test — backend (pom.xml)
        if: env.SNYK_TOKEN != ''
        run: npx snyk@latest test --file=server/pom.xml --severity-threshold=high --policy-path=.snyk

      # Snyk frontend 需要 node_modules 才能扫，先装 Node + yarn 依赖
      - name: Setup Node.js 22
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install frontend dependencies
        if: env.SNYK_TOKEN != ''
        run: yarn install --frozen-lockfile

      # Snyk frontend — only runs when SNYK_TOKEN secret is present
      - name: Snyk test — H5 frontend (package.json)
        if: env.SNYK_TOKEN != ''
        run: npx snyk@latest test --file=app/h5/package.json --severity-threshold=high --policy-path=.snyk

  build-verify:
    name: Build Verification
    # Only runs after both backend-checks and frontend-checks pass
    needs: [backend-checks, frontend-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Build backend JAR (skip tests)
        working-directory: server
        run: mvn package -DskipTests

      - name: Install frontend dependencies and build H5
        # `nuxt build` runs `nuxt prepare` internally, so .nuxt/tsconfig.json
        # is regenerated automatically here — no separate prepare step needed.
        run: |
          yarn install --frozen-lockfile
          yarn workspace oa-h5 build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast-check-backend-jar
          path: server/target/*.jar
          retention-days: 3

      - name: Upload H5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast-check-h5-dist
          path: app/h5/.output/
          retention-days: 3
