server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  # 统一错误响应：默认错误页不暴露 message / 堆栈 / 绑定错误 / 异常类型。
  # 业务错误通过 GlobalExceptionHandler 统一返回 {"code","message"}。
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: oa-backend

  # 让未匹配路由抛 NoHandlerFoundException，交由 GlobalExceptionHandler 统一处理。
  mvc:
    throw-exception-if-no-handler-found: true

  # 关闭默认静态资源映射，避免吞掉 404 返回空白页而不抛异常。
  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: jdbc:h2:mem:oa_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 附件上传目录（相对于服务启动目录）
oa:
  upload-dir: ./uploads

# 电子签名配置
app:
  signature:
    # AES-256 密钥，必须为 32 字符
    # 生产环境请务必修改此密钥
    aes-key: ${APP_SIGNATURE_AES_KEY:__REDACTED_DEFAULT_AES_KEY__}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:__REDACTED_DEFAULT_JWT_SECRET__}
  expiration: 86400000  # 24小时
  issuer: oa-backend

# 日志配置
logging:
  level:
    com.oa: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
