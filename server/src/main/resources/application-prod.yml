spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/boyuan_oa}
    username: ${DB_USERNAME:oa}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  signature:
    aes-key: ${SIGNATURE_AES_KEY}
  # 生产跨域白名单，逗号分隔。未设置 CORS_ORIGINS 时为空，拒绝所有跨域请求。
  # 示例：CORS_ORIGINS=https://oa.example.com,https://admin.example.com
  cors:
    origins: ${CORS_ORIGINS:}

oa:
  upload-dir: ${OA_UPLOAD_DIR:/var/oa/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.oa: INFO

server:
  port: ${SERVER_PORT:8080}
