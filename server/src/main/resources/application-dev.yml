# Dev profile: PostgreSQL oa_dev database, Flyway migrations, debug logging
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/oa_dev
    driver-class-name: org.postgresql.Driver
    username: oa_dev
    password: oa_dev_password

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

logging:
  level:
    com.oa: DEBUG
    org.flywaydb: INFO
