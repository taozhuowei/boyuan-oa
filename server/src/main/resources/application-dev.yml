# Dev profile overrides
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Base configuration (datasource, multipart, etc.) comes from application.yml.
# This file only enables dev-only conveniences that must NOT leak into default/prod runs:
#   - H2 web console at /h2-console
#   - Hibernate SQL logging
#   - DEBUG level for com.oa package

spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.oa: DEBUG
