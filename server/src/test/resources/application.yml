# Test profile: PostgreSQL oa_test database, Flyway migrations + test-account seed
# Activate by running mvn test (test resources take precedence over main resources)
server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/oa_test
    driver-class-name: org.postgresql.Driver
    username: oa_dev
    password: oa_dev_password

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

jwt:
  secret: test-secret-key-for-unit-tests-only
  expiration: 86400000
  issuer: oa-backend

app:
  signature:
    aes-key: TestSignatureKey2024ForUnitTests32
  # 测试环境必须与生产一致以真实覆盖限流行为。
  # 不允许通过调高阈值绕开测试覆盖（历史教训：100000 让 AUTH 限流用例长期 skip）。
  # 单元/集成测试若需要跳过限流影响，调用 DevController POST /dev/reset-rate-limit 清计数。
  rate-limit:
    global-per-minute: 300
    login-fail-threshold: 5

oa:
  upload-dir: /tmp/oa-test-uploads

logging:
  level:
    com.oa: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: WARN
