# Test profile: H2 in-memory DB, 24h JWT, suppress noisy SQL logs
server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:h2:mem:oa_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

jwt:
  secret: test-secret-key-for-unit-tests-only
  expiration: 86400000
  issuer: oa-backend

# 电子签名配置
app:
  signature:
    aes-key: TestSignatureKey2024ForUnitTests32

logging:
  level:
    com.oa: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
