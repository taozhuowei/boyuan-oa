# Test profile: PostgreSQL oa_test database, Flyway migrations + test-account seed
# Activate by running mvn test (test resources take precedence over main resources)
server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/oa_test
    driver-class-name: org.postgresql.Driver
    username: oa_dev
    password: oa_dev_password

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

jwt:
  secret: test-secret-key-for-unit-tests-only
  expiration: 86400000
  issuer: oa-backend

app:
  signature:
    aes-key: TestSignatureKey2024ForUnitTests32
  # D-F-20: 测试环境禁用全局限流（设为极大值），避免集成测试因大量登录请求触发 429
  # D-F-19: 测试环境将登录失败阶梯锁定阈值调高，避免错误密码测试用例锁定 127.0.0.1 影响后续测试
  rate-limit:
    global-per-minute: 100000
    login-fail-threshold: 100000

oa:
  upload-dir: /tmp/oa-test-uploads

logging:
  level:
    com.oa: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: WARN
